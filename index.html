<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* Master input box alignment system */
        .login-input {
            position: absolute;
            left: 19.3%;              /* Aligns perfectly with the left edge of the capsule graphic */
            width: 21.2%;             /* Spans the entire width of the capsule box */
            height: 4.8%;             /* Matches capsule vertical thickness */
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Comfortaa', sans-serif;
            font-size: clamp(10px, 1.0vw, 14px);
            color: #6d5339;           /* Matches the aesthetic brown theme color */
            
            /* CRITICAL FIXES: Spacing text cleanly away from background graphic labels */
            padding-left: 58px;       /* Pushes typed text right past the Canva "Email/Password" labels */
            padding-top: 2px;         /* Nudges text slightly downward into the vertical center */
        }
        
        .email-field {
            top: 53.3%;
        }
        
        .password-field {
            top: 62.1%;
            letter-spacing: 2px;
        }

        /* Hotspots */
        .google-hotspot, .login-hotspot {
            position: absolute;
            cursor: pointer;
            border-radius: 30px;
            background-color: rgba(255, 0, 0, 0); /* 100% Invisible */
            border: none;
            padding: 0;
        }

        .google-hotspot {
            top: 42.6%;
            left: 19.3%;
            width: 21.2%;
            height: 5.6%;
        }

        .login-hotspot {
            top: 72.8%;
            left: 19.3%;
            width: 21.2%;
            height: 5.6%;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="login.png" alt="Login Page" class="web-page">
        
        <button class="google-hotspot" onclick="simulateGoogleLogin()"></button>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <input type="email" id="emailInput" class="login-input email-field" required>
            <input type="password" id="passwordInput" class="login-input password-field" required>
            
            <button type="submit" class="login-hotspot"></button>
        </form>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (email && password) {
                window.location.href = "home.html";
            }
        }

        function simulateGoogleLogin() {
            alert("Logging in automatically via Google using your UP Mail account (@up.edu.ph)...");
            window.location.href = "home.html";
        }
    </script>

</body>
</html>
