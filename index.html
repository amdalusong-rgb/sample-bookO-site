<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925; /* Matches your background green */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px; /* Limits size nicely on desktop */
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }
        /* This is the invisible button area mapped over the login graphic */
        .login-hotspot {
            position: absolute;
            top: 73.5%;       /* Measures down precisely to the brown button level */
            left: 19.3%;      /* Aligns the left boundary with the button start edge */
            width: 17.2%;     /* Spans across the entire horizontal length of the button */
            height: 5.2%;     /* Covers the vertical height of the button block */
            cursor: pointer;
            border-radius: 20px; /* Gives the clickable area the same curved edges as your graphic */
            background-color: rgba(255, 0, 0, 0.5); /* Kept red so we can confirm it hit the target */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="login.png" alt="Login Page" class="web-page">
        
        <a href="home.html" class="login-hotspot"></a>
    </div>

</body>
</html>
