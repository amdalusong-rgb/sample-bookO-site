<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925; /* Matches your background green */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px; /* Limits size nicely on desktop */
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }
        /* This is the invisible button area mapped over the login graphic */
        .login-hotspot {
            position: absolute;
            top: 72.8%;       /* Nudges the box slightly higher up */
            left: 19.3%;      /* Keeps it centered with the login box */
            width: 21.2%;     /* Widened to perfectly match the brown button ends */
            height: 5.6%;     /* Made slightly taller to match the button thickness */
            cursor: pointer;
            border-radius: 30px; /* Perfectly matches the curved ends of your button */
            background-color: rgba(255, 0, 0, 0); /* CHANGED TO 0: Makes it 100% invisible! */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="login.png" alt="Login Page" class="web-page">
        
        <a href="home.html" class="login-hotspot"></a>
    </div>

</body>
</html>
