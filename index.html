<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO</title>
    <!-- Importing a rounded font to closely match your Canva design -->
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', 'Quicksand', 'Nunito', sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* Fixed and aligned input box settings */
        .login-input {
            position: absolute;
            left: 20%;               /* Shifted further right to sit inside the capsule shapes */
            width: 16.5%;            /* Stretched horizontally to fill the text region safely */
            height: 5.2%;            /* Matched thickness of your entry boxes */
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;    /* Inherits our clean rounded font styles */
            font-size: clamp(10px, 1.1vw, 14px); /* Scales font size cleanly dynamically */
            color: #7c6853;          /* Soft charcoal brown to blend into design text */
        }
        
        /* Precision vertical alignments */
        .email-field {
            top: 53.0%;
        }
        
        .password-field {
            top: 61.8%;
        }

        /* Hotspot Elements */
        .google-hotspot, .login-hotspot {
            position: absolute;
            cursor: pointer;
            border-radius: 30px;
            background-color: rgba(255, 0, 0, 0); /* 100% Invisible */
            border: none;
            padding: 0;
        }

        /* Continue with Google Area */
        .google-hotspot {
            top: 42.6%;
            left: 19.3%;
            width: 21.2%;
            height: 5.6%;
        }

        /* Brown Log In Button Area */
        .login-hotspot {
            top: 72.8%;
            left: 19.3%;
            width: 21.2%;
            height: 5.6%;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Background Graphic Layer -->
        <img src="login.png" alt="Login Page" class="web-page">
        
        <!-- Continue with Google Hotspot -->
        <button class="google-hotspot" onclick="simulateGoogleLogin()"></button>
        
        <!-- Wrapped inside a formal submission form structure -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <!-- Interactive Text Slots -->
            <input type="email" id="emailInput" class="login-input email-field" required>
            <input type="password" id="passwordInput" class="login-input password-field" required>
            
            <!-- Clicking this brown hotspot triggers form submission validation -->
            <button type="submit" class="login-hotspot"></button>
        </form>
    </div>

    <script>
        function handleLogin(event) {
            // Stops page from performing traditional empty reloads
            event.preventDefault();
            
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            // Ensures entry values are valid before executing navigation
            if (email && password) {
                window.location.href = "home.html";
            }
        }

        function simulateGoogleLogin() {
            alert("Logging in automatically via Google using your UP Mail account (@up.edu.ph)...");
            window.location.href = "home.html";
        }
    </script>

</body>
</html>
