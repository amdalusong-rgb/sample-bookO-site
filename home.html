<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }
        #fileInput {
            display: none;
        }

        /* The real-time dynamic card that will show your filename when uploaded */
        .dynamic-file-card {
            position: absolute;
            top: 55.6%;
            left: 71.3%;
            width: 13.0%;
            height: 11.5%;
            background-color: #5d432c; 
            border-radius: 40px;       
            display: none;             /* Starts hidden until file is chosen */
            align-items: center;
            padding: 0 16px;
            z-index: 10;
            cursor: pointer;
            color: #f3edd7;
        }

        .file-icon {
            width: 20px;
            height: 25px;
            background-color: #f3edd7;
            border-radius: 3px;
            position: relative;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .file-icon::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 7px;
            height: 7px;
            background-color: #5d432c;
            border-bottom-left-radius: 3px;
        }

        .file-info-block {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-align: left;
        }

        .file-name-text {
            font-size: clamp(8px, 0.75vw, 11px);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0;
        }

        .file-size-text {
            font-size: clamp(7px, 0.65vw, 9px);
            color: #c9b39c;
            margin: 2px 0 0 0;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="home.png" alt="Home Page" class="web-page" usemap="#home-map">

        <input type="file" id="fileInput" accept=".pdf">

        <map name="home-map">
            <area shape="rect" coords="640,20,720,60" alt="Read" href="#" onclick="alert('Read Tab Clicked!')">
            <area shape="rect" coords="730,20,860,60" alt="Assessment" href="#" onclick="alert('Assessment Tab Clicked!')">
            <area shape="rect" coords="870,20,960,60" alt="Profile" href="#" onclick="alert('Profile Tab Clicked!')">
            
            <area shape="rect" coords="850,380,1010,480" alt="Upload Box" href="#" onclick="triggerBrowse()">
            
            <area shape="rect" coords="850,530,1010,580" alt="Let's Read" href="#" onclick="processPdf()">
        </map>

        <div class="dynamic-file-card" id="fileCard" onclick="triggerBrowse()">
            <div class="file-icon"></div>
            <div class="file-info-block">
                <p class="file-name-text" id="cardName">Document.pdf</p>
                <p class="file-size-text" id="cardSize">0.0 KB</p>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileCard = document.getElementById('fileCard');
        const cardName = document.getElementById('cardName');
        const cardSize = document.getElementById('cardSize');
        let uploadedFile = null;

        function triggerBrowse() {
            fileInput.click();
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelection(e.target.files[0]);
            }
        });

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function handleFileSelection(file) {
            if (file.type === "application/pdf" || file.name.endsWith('.pdf')) {
                uploadedFile = file;
                
                cardName.innerText = file.name;
                cardSize.innerText = formatBytes(file.size);
                
                // Show file card badge directly above your graphic
                fileCard.style.display = 'flex';
            } else {
                alert("Please upload PDF files only.");
            }
        }

        function processPdf() {
            if (!uploadedFile) {
                alert("Please choose a file first by clicking the Drop PDF oval icon!");
                return;
            }
            alert(`Opening "${uploadedFile.name}" inside your bookO line-focus reader!`);
        }
    </script>

</body>
</html>
