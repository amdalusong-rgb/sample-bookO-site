<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }

        #fileInput {
            display: none;
        }

        /* TARGET 1: "Drop your PDF here" Container 
           Temporarily red so you can see the placement!
        */
        .drop-zone-hotspot {
            position: absolute;
            top: 45.0%;               /* Shifted up to sit over the big drop card */
            left: 56.5%;              /* Positioned over the right panel card area */
            width: 37.5%;             /* Stretched to fit the width of the drop container */
            height: 25.0%;            /* Tall enough to cover the entire dotted box region */
            border-radius: 20px;
            cursor: pointer;
            background-color: rgba(255, 0, 0, 0.4); /* Semi-transparent Red */
            transition: background-color 0.2s ease;
        }

        .drop-zone-hotspot.dragover {
            background-color: rgba(109, 83, 57, 0.6) !important;
        }

        /* TARGET 2: "Let's Read!" Button Container
           Temporarily blue so you can see the placement!
        */
        .read-btn-hotspot {
            position: absolute;
            top: 73.2%;               /* Sitting right under the file box */
            left: 65.2%;              /* Centered with your tan button graphic */
            width: 20.0%;             /* Fits width of the tan button */
            height: 5.5%;             /* Fits height of the tan button */
            border-radius: 30px;
            cursor: pointer;
            background-color: rgba(0, 0, 255, 0.4); /* Semi-transparent Blue */
            border: none;
            padding: 0;
        }

        /* Text element tracking file attachment name updates */
        .file-status-text {
            position: absolute;
            top: 40.5%;
            left: 56.5%;
            width: 37.5%;
            text-align: center;
            font-size: clamp(12px, 1.1vw, 16px);
            color: #ffffff;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="home.png" alt="Home Page" class="web-page">

        <input type="file" id="fileInput" accept=".pdf">

        <div class="drop-zone-hotspot" id="dropZone" onclick="triggerBrowse()"></div>

        <div class="file-status-text" id="statusText"></div>

        <button class="read-btn-hotspot" onclick="processPdf()"></button>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusText = document.getElementById('statusText');
        let uploadedFile = null;

        function triggerBrowse() {
            fileInput.click();
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelection(e.target.files[0]);
            }
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelection(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelection(file) {
            if (file.type === "application/pdf" || file.name.endsWith('.pdf')) {
                uploadedFile = file;
                statusText.innerText = `📄 Loaded: ${file.name}`;
            } else {
                alert("Please upload PDF files only.");
            }
        }

        function processPdf() {
            if (!uploadedFile) {
                alert("Please drop a PDF or click the red zone to browse before continuing.");
                return;
            }
            alert(`Opening "${uploadedFile.name}" inside your bookO line-focus reader layout loop!`);
        }
    </script>

</body>
</html>
