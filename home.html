<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #2b3925;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Comfortaa', sans-serif;
        }
        .wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 1000px; 
            margin: auto; 
        }
        .web-page { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* Nav Hotspots */
        .nav-hotspot { position: absolute; top: 4.5%; height: 4.5%; cursor: pointer; z-index: 10; }
        .btn-home { left: 42.5%; width: 7.5%; }
        .btn-read { left: 51.0%; width: 6.5%; }

        /* The Upload Target Box Area */
        .drop-zone {
            position: absolute;
            top: 57.2%; left: 71.9%;
            width: 13.5%; height: 8.2%;
            border-radius: 30px;
            cursor: pointer;
            z-index: 15;
        }

        /* FIXED: Solid Brown Pill Layout Layer */
        .file-pill-container {
            display: none; 
            width: 100%;
            height: 100%;
            background-color: #5c2c16 !important; /* Prevents underlying image text bleed-through */
            border-radius: 30px;
            position: absolute;
            top: 0; left: 0;
            align-items: center;
            justify-content: flex-start;
            padding: 0 15px;
            gap: 10px;
            z-index: 25;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* Graphic Document File Thumbnail */
        .file-icon {
            width: 20px;
            height: 25px;
            background-color: #fff8eb;
            border-radius: 3px;
            position: relative;
            flex-shrink: 0;
        }
        .file-icon::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 6px; height: 6px;
            background-color: #ddcfba;
            border-bottom-left-radius: 3px;
        }

        /* File Label Metrics Typography */
        .file-meta {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            text-align: left;
        }
        .file-name {
            color: #fcead2;
            font-size: 0.62rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80px;
        }
        .file-size {
            color: #c99b77;
            font-size: 0.52rem;
            font-weight: 500;
            margin-top: 1px;
        }

        /* FIXED: Realigned 'Let's Read' Target Button Area */
        .btn-lets-read {
            position: absolute;
            top: 80.5%; left: 71.4%;
            width: 14.5%; height: 5.2%;
            cursor: pointer;
            z-index: 40; /* Elevated layer depth priority */
            background-color: rgba(0, 0, 0, 0);
            border-radius: 20px;
        }
        .btn-lets-read:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="home.png" alt="bookO Layout background" class="web-page">

        <div class="nav-hotspot btn-home" onclick="window.location.href='home.html'"></div>
        <div class="nav-hotspot btn-read" onclick="window.location.href='read.html'"></div>

        <div id="dropZone" class="drop-zone">
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            
            <div id="filePill" class="file-pill-container">
                <div class="file-icon"></div>
                <div class="file-meta">
                    <div id="pillFileName" class="file-name">Document.pdf</div>
                    <div id="pillFileSize" class="file-size">0.0 KB</div>
                </div>
            </div>
        </div>

        <div class="btn-lets-read" onclick="navigateToReader()"></div>
    </div>
