<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #2b3925;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Comfortaa', sans-serif;
        }
        .wrapper { position: relative; width: 100%; max-width: 1000px; margin: auto; }
        .web-page { width: 100%; height: auto; display: block; }

        /* Navigation Hotspots */
        .nav-hotspot { position: absolute; top: 4.5%; height: 4.5%; cursor: pointer; z-index: 10; }
        .btn-home { left: 42.5%; width: 7.5%; }
        .btn-read { left: 51.0%; width: 6.5%; }

        /* Drag & Drop Area Box */
        .drop-zone {
            position: absolute;
            top: 54%; left: 71.5%;
            width: 14%; height: 16%;
            border: 2px dashed transparent;
            border-radius: 20px;
            cursor: pointer;
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .drop-zone.dragover { border-color: #7a9a60; background-color: rgba(122, 154, 96, 0.15); }
        
        /* Action Button */
        .btn-lets-read {
            position: absolute;
            top: 92.5%; left: 71.8%;
            width: 13.5%; height: 4%;
            cursor: pointer;
            z-index: 20;
            background-color: rgba(0,0,0,0);
        }

        /* Status Label indicator overlay */
        #uploadStatus {
            position: absolute;
            top: 73%; left: 70%;
            width: 17%;
            font-size: 0.75rem;
            font-weight: 700;
            color: #d1e2c4;
            text-align: center;
            z-index: 12;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="home.png" alt="bookO Main Dashboard Layout" class="web-page">

        <div class="nav-hotspot btn-home" onclick="window.location.href='home.html'"></div>
        <div class="nav-hotspot btn-read" onclick="window.location.href='read.html'"></div>

        <div id="dropZone" class="drop-zone">
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
        </div>

        <div id="uploadStatus">Ready for your PDF file...</div>
        <div class="btn-lets-read" onclick="navigateToReader()"></div>
    </div>

    <script>
        // Point PDF.js to its internal worker script asset location
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusLabel = document.getElementById('uploadStatus');
        let extractedSentences = [];

        // Direct clicking fallback activation trigger
        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => handleFileSelection(e.target.files[0]));

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if(e.dataTransfer.files.length > 0) handleFileSelection(e.dataTransfer.files[0]);
        });

        function handleFileSelection(file) {
            if (!file || file.type !== "application/pdf") {
                statusLabel.innerText = "Error: Please upload a valid PDF document file.";
                return;
            }
            statusLabel.innerText = "Parsing contents: " + file.name.substring(0, 20) + "...";
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const typedarray = new Uint8Array(e.target.result);
                
                // Fire up PDF parsing engine loops
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    // Extract text strings from Page 1
                    return pdf.getPage(1).then(function(page) {
                        return page.getTextContent().then(function(textContent) {
                            let rawText = textContent.items.map(item => item.str).join(" ");
                            
                            // Split raw document string cleanly into real sentences
                            let sentences = rawText.match(/[^.!?]+[.!?]+/g) || [rawText];
                            extractedSentences = sentences.map(s => s.trim()).filter(s => s.length > 3);
                            
                            if(extractedSentences.length > 0) {
                                statusLabel.style.color = "#ffffff";
                                statusLabel.innerText = "✓ " + file.name.substring(0, 16) + " loaded successfully!";
                                // Save structured strings into shared browser memory loops
                                localStorage.setItem("processedPdfText", JSON.stringify(extractedSentences));
                            } else {
                                statusLabel.innerText = "Warning: Scanned PDF detected. No readable text tracks found.";
                                // Fallback standard string backup path
                                localStorage.setItem("processedPdfText", JSON.stringify(["Could not parse native text.", "Please try an essay or document file instead!"]));
                            }
                        });
                    });
                }).catch(err => {
                    console.error(err);
                    statusLabel.innerText = "Parser engine error reading file structure.";
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function navigateToReader() {
            if (!localStorage.getItem("processedPdfText")) {
                alert("Please drop or upload a textbook or document PDF file first!");
                return;
            }
            window.location.href = 'read.html';
        }
    </script>
</body>
</html>
