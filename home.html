<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #2b3925;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Comfortaa', sans-serif;
            user-select: none; /* Prevents text highlighting selections from breaking layout clicks */
        }
        .wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 1000px; 
            margin: auto; 
        }
        .web-page { 
            width: 100%; 
            height: auto; 
            display: block; 
            z-index: 1;
            position: relative;
        }

        /* Nav Links */
        .nav-hotspot { position: absolute; top: 4.5%; height: 4.5%; cursor: pointer; z-index: 100; }
        .btn-home { left: 42.5%; width: 7.5%; }
        .btn-read { left: 51.0%; width: 6.5%; }

        /* FIXED: Exact coordinates for the dashed File Drop/Upload Area */
        .drop-zone {
            position: absolute;
            top: 56.5%; 
            left: 71.5%;
            width: 14.2%; 
            height: 9.0%;
            border-radius: 30px;
            cursor: pointer;
            z-index: 50; /* Forces clickable zone completely above background artwork layout layers */
        }
        
        /* FIXED: Solid Non-Transparent Brown Indicator Box */
        .file-pill-container {
            display: none; 
            width: 100%;
            height: 100%;
            background-color: #5c2c16 !important; /* Blocks text layers beneath from displaying */
            border-radius: 30px;
            position: absolute;
            top: 0; left: 0;
            align-items: center;
            justify-content: flex-start;
            padding: 0 14px;
            gap: 10px;
            z-index: 60;
            pointer-events: none; /* Passes mouse click vectors down directly into document triggers */
            border: 2px dashed #925338;
        }

        /* Document Graphic Layout Vector Icon */
        .file-icon {
            width: 20px;
            height: 25px;
            background-color: #fff8eb;
            border-radius: 3px;
            position: relative;
            flex-shrink: 0;
        }
        .file-icon::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 6px; height: 6px;
            background-color: #ddcfba;
            border-bottom-left-radius: 3px;
        }

        /* Typography Settings */
        .file-meta {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            text-align: left;
        }
        .file-name {
            color: #fcead2;
            font-size: 0.62rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 82px;
        }
        .file-size {
            color: #c99b77;
            font-size: 0.52rem;
            font-weight: 500;
            margin-top: 1px;
        }

        /* FIXED: Accurate target overlay mapping directly matching 'Let's Read' graphic button */
        .btn-lets-read {
            position: absolute;
            top: 79.5%; 
            left: 71.4%;
            width: 14.5%; 
            height: 5.5%;
            cursor: pointer;
            z-index: 90; /* High stack order layer prevents input field clicks from hijacking event */
            background-color: rgba(0, 0, 0, 0); 
            border-radius: 25px;
        }
        .btn-lets-read:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="home.png" alt="bookO Layout background" class="web-page">

        <div class="nav-hotspot btn-home" onclick="window.location.href='home.html'"></div>
        <div class="nav-hotspot btn-read" onclick="window.location.href='read.html'"></div>

        <div id="dropZone" class="drop-zone">
            <input type="file" id="fileInput" accept=".pdf" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; z-index: 55;">
            
            <div id="filePill" class="file-pill-container">
                <div class="file-icon"></div>
                <div class="file-meta">
                    <div id="pillFileName" class="file-name">Document.pdf</div>
                    <div id="pillFileSize" class="file-size">0.0 KB</div>
                </div>
            </div>
        </div>

        <div class="btn-lets-read" onclick="navigateToReader()"></div>
    </div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const filePill = document.getElementById('filePill');
    const pillFileName = document.getElementById('pillFileName');
    const pillFileSize = document.getElementById('pillFileSize');
    let uploadedFile = null;

    // Direct click tracking handler mapping
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleFileSelection(e.target.files[0]);
    });

    // Native browser window event behavior overrides
    window.addEventListener('dragover', (e) => e.preventDefault());
    window.addEventListener('drop', (e) => e.preventDefault());
    
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            handleFileSelection(e.dataTransfer.files[0]);
        }
    });

    function handleFileSelection(file) {
        if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
            alert("Please upload a valid PDF document file.");
            return;
        }
        uploadedFile = file;
        
        let sizeText = (file.size / 1024).toFixed(1) + " KB";
        if (file.size > 1048576) {
            sizeText = (file.size / 1048576).toFixed(1) + " MB";
        }

        pillFileName.innerText = file.name;
        pillFileSize.innerText = sizeText;
        filePill.style.display = 'flex'; // Reveals solid brown display box mask
    }

    function navigateToReader() {
        if (!uploadedFile) {
            alert("Please choose or drop a PDF file first!");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const typedarray = new Uint8Array(e.target.result);

            pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                let maxPages = Math.min(pdf.numPages, 5);
                let countPromises = [];
                
                for (let i = 1; i <= maxPages; i++) {
                    countPromises.push(pdf.getPage(i).then(page => {
                        return page.getTextContent().then(textContent => {
                            return textContent.items.map(item => item.str).join(" ");
                        });
                    }));
                }

                return Promise.all(countPromises).then(pagesText => {
                    let rawText = pagesText.join(" ").replace(/\s+/g, ' ').trim();
                    
                    // Splits file string array elements step-by-step at sentence endings (. ! ?)
                    let sentencesArray = rawText.match(/[^.!?]+[.!?]+(\s|$)/g);

                    if (sentencesArray && sentencesArray.length > 0) {
                        sentencesArray = sentencesArray.map(s => s.trim()).filter(s => s.length > 3);
                    } else {
                        sentencesArray = rawText.split('.').map(s => s.trim() + ".").filter(s => s.length > 3);
                    }

                    if (sentencesArray && sentencesArray.length > 0) {
                        localStorage.setItem("processedPdfText", JSON.stringify(sentencesArray));
                        window.location.href = "read.html";
                    } else {
                        alert("Could not parse text channels. Trying alternative sequence extraction framework...");
                    }
                });
            }).catch(function(err) {
                console.error(err);
                alert("Error parsing document file asset.");
            });
        };
        reader.readAsArrayBuffer(uploadedFile);
    }
</script>
</body>
</html>
