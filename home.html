<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Hidden standard file input */
        #fileInput {
            display: none;
        }

        /* Interactive Drag & Drop Area Overlay */
        .drop-zone-hotspot {
            position: absolute;
            top: 52.5%;
            left: 70.8%;
            width: 11.5%;
            height: 7.2%;
            border-radius: 25px;
            cursor: pointer;
            background-color: rgba(255, 0, 0, 0); /* Invisible by default */
            transition: background-color 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Visual indicator when a file is hovering over the area */
        .drop-zone-hotspot.dragover {
            background-color: rgba(109, 83, 57, 0.3); /* Subtle theme-brown highlight */
            border: 2px dashed #6d5339;
        }

        /* Feedback text overlay showing uploaded file name safely beneath the area */
        .file-status-text {
            position: absolute;
            top: 67.5%;
            left: 67.0%;
            width: 19.0%;
            text-align: center;
            font-size: clamp(10px, 0.9vw, 13px);
            color: #6d5339;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }

        /* "Let's Read!" Action Button Hotspot */
        .read-btn-hotspot {
            position: absolute;
            top: 69.2%;
            left: 70.8%;
            width: 11.5%;
            height: 3.2%;
            border-radius: 20px;
            cursor: pointer;
            background-color: rgba(255, 0, 0, 0); /* Invisible */
            border: none;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Background Graphic Layer -->
        <img src="home2.png" alt="Home Page" class="web-page">

        <!-- Hidden Native Upload Element -->
        <input type="file" id="fileInput" accept=".pdf">

        <!-- Active Drag and Drop Area -->
        <div class="drop-zone-hotspot" id="dropZone" onclick="triggerBrowse()"></div>

        <!-- Dynamic Status Display text area -->
        <div class="file-status-text" id="statusText"></div>

        <!-- Form Submission Button trigger area -->
        <button class="read-btn-hotspot" onclick="processPdf()"></button>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusText = document.getElementById('statusText');
        let uploadedFile = null;

        // Triggers the hidden file input explorer window when clicked
        function triggerBrowse() {
            fileInput.click();
        }

        // Catch files chosen via the standard system browse window
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelection(e.target.files[0]);
            }
        });

        /* Drag and Drop event handlers */
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                handleFileSelection(e.dataTransfer.files[0]);
            }
        });

        // Processes and validates the file choice
        function handleFileSelection(file) {
            if (file.type === "application/pdf" || file.name.endsWith('.pdf')) {
                uploadedFile = file;
                // Display file name to user cleanly
                statusText.innerText = `Selected: ${file.name}`;
                statusText.style.color = "#2b3925"; // Change color slightly to pop out
            } else {
                alert("Please upload PDF files only.");
            }
        }

        // Action when user clicks the "Let's Read!" button
        function processPdf() {
            if (!uploadedFile) {
                alert("Please drop a PDF here or click to browse before continuing.");
                return;
            }
            
            alert(`Successfully loaded "${uploadedFile.name}"! Preparing line-by-line focus layout...`);
            // This is where we can link your future reader layout down the line!
        }
    </script>

</body>
</html>
