<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }

        #fileInput {
            display: none;
        }

        /* --------------------------------------------------
           NAV HEADER HOTSPOTS (Unblocked & Clickable)
        -------------------------------------------------- */
        .nav-hotspot {
            position: absolute;
            top: 25.0%;
            height: 4.5%;
            cursor: pointer;
            background-color: rgba(0, 255, 0, 0); /* Invisible, green if tested */
            z-index: 20;
        }
        .nav-read { left: 54.0%; width: 6.5%; }
        .nav-assessment { left: 61.5%; width: 10.0%; }
        .nav-profile { left: 72.5%; width: 7.5%; }


        /* --------------------------------------------------
           RECALIBRATED FILE UPLOAD CAPSULE (RED)
        -------------------------------------------------- */
        .drop-zone-hotspot {
            position: absolute;
            top: 55.6%;               /* Locked directly over the dashed oval center */
            left: 71.3%;              /* Centered over the asset card */
            width: 13.0%;             /* Perfectly matches the capsule width */
            height: 11.5%;            /* Perfectly matches the capsule height */
            border-radius: 40px;      /* Rounded capsule geometry matching the oval */
            cursor: pointer;
            background-color: rgba(255, 0, 0, 0.45); /* Semi-transparent Red for easy verification */
            transition: background-color 0.2s ease;
            z-index: 10;
        }

        /* --------------------------------------------------
           DYNAMIC HTML FILE CARD (Renders on successful upload)
        -------------------------------------------------- */
        .dynamic-file-card {
            position: absolute;
            top: 55.6%;
            left: 71.3%;
            width: 13.0%;
            height: 11.5%;
            background-color: #5d432c; /* Matches exact brown palette of design */
            border-radius: 40px;       /* Clips seamlessly to cover the base oval */
            display: none;             /* Inactive until selection hook matches */
            align-items: center;
            padding: 0 16px;
            z-index: 11;
            pointer-events: auto;      /* Clicking it triggers the input browse selection process */
            cursor: pointer;
        }

        .file-icon {
            width: 20px;
            height: 25px;
            background-color: #f3edd7;
            border-radius: 3px;
            position: relative;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .file-icon::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 7px;
            height: 7px;
            background-color: #5d432c;
            border-bottom-left-radius: 3px;
        }

        .file-info-block {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #f3edd7;
            text-align: left;
