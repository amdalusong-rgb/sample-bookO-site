<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #2b3925;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Comfortaa', sans-serif;
        }
        .wrapper { position: relative; width: 100%; max-width: 1000px; margin: auto; }
        .web-page { width: 100%; height: auto; display: block; }

        /* Navigation Hotspots */
        .nav-hotspot { position: absolute; top: 4.5%; height: 4.5%; cursor: pointer; z-index: 10; }
        .btn-home { left: 42.5%; width: 7.5%; }
        .btn-read { left: 51.0%; width: 6.5%; }

        /* Drop Zone - Framed tightly over the brown upload dashed oval container */
        .drop-zone {
            position: absolute;
            top: 54.8%; left: 71.9%;
            width: 13.5%; height: 11.5%;
            border-radius: 25px;
            cursor: pointer;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .drop-zone.dragover { background-color: rgba(255, 255, 255, 0.15); }
        
        /* The Brown Pill UI Box that populates inside the container upon upload */
        .file-pill-container {
            display: none; /* Hidden until file is uploaded */
            width: 100%;
            height: 100%;
            background-color: #5c2c16; /* Seamless blend match for your background asset */
            align-items: center;
            justify-content: flex-start;
            padding: 0 12px;
            gap: 10px;
        }

        /* Pure CSS Custom File Thumbnail Icon */
        .file-icon {
            width: 24px;
            height: 30px;
            background-color: #fff8eb;
            border-radius: 4px;
            position: relative;
            flex-shrink: 0;
        }
        /* Top right page dog-ear corner fold effect */
        .file-icon::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 8px; height: 8px;
            background-color: #ddcfba;
            border-bottom-left-radius: 4px;
        }

        /* Meta details wrapper */
        .file-meta {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            text-align: left;
        }
        .file-name {
            color: #fcead2;
            font-size: 0.65rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-size {
            color: #c99b77;
            font-size: 0.55rem;
            font-weight: 500;
            margin-top: 1px;
        }

        /* "Let's Read" Button - Shifted up to securely frame the golden pill button asset */
        .btn-lets-read {
            position: absolute;
            top: 77.5%; left: 71.5%;
            width: 14.2%; height: 4.5%;
            cursor: pointer;
            z-index: 20;
            background-color: rgba(0,0,0,0); /* Transparent hotspot layer over graphic asset */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="home.png" alt="bookO Main Dashboard Layout" class="web-page">

        <div class="nav-hotspot btn-home" onclick="window.location.href='home.html'"></div>
        <div class="nav-hotspot btn-read" onclick="window.location.href='read.html'"></div>

        <div id="dropZone" class="drop-zone">
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            
            <div id="filePill" class="file-pill-container">
                <div class="file-icon"></div>
                <div class="file-meta">
                    <div id="pillFileName" class="file-name">Document.pdf</div>
                    <div id="pillFileSize" class="file-size">0.0 KB</div>
                </div>
            </div>
        </div>

        <div class="btn-lets-read" onclick="navigateToReader()"></div>
    </div>
