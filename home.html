<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }
        #fileInput {
            display: none;
        }

        /* ==========================================================================
           MANUAL INTERACTIVE ALIGNMENT CONFIGURATIONS (Change values here to adjust)
           ========================================================================== */

        /* NAV HEADER HOTSPOTS (Read, Assessment, Profile) */
        .header-nav-hotspot {
            position: absolute;
            top: 4.8%;                /* Vertically moves all top header links */
            height: 4.0%;             /* Height of the clickable text space area */
            cursor: pointer;
            background-color: rgba(0, 255, 0, 0); /* 100% Invisible */
            z-index: 10;
        }
        .btn-nav-read { left: 54.0%; width: 6.5%; }
        .btn-nav-assess { left: 61.5%; width: 10.0%; }
        .btn-nav-profile { left: 72.5%; width: 7.5%; }

        /* OVAL DROP ZONE REGION BUTTON OVERLAY 
           To change size/position, modify top, left, width, and height values below.
        */
        .custom-upload-hotspot {
            position: absolute;
            top: 55.4%;               /* Shift UP or DOWN */
            left: 71.3%;              /* Shift LEFT or RIGHT */
            width: 13.0%;             /* Make WIDER or NARROWER */
            height: 11.5%;            /* Make TALLER or SHORTER */
            border-radius: 40px;      /* Curves the corners into an oval shape capsule */
            cursor: pointer;
            
            /* CHANGE COLOR TRANSPARENCY HERE 
               Currently set to '0' (Invisible). Change to '0.4' to see it turn red for testing!
            */
            background-color: rgba(255, 0, 0, 0); 
            z-index: 5;
        }

        /* "LET'S READ!" BASE CTA ACTION TRIGGER BUTTON */
        .custom-read-hotspot {
            position: absolute;
            top: 77.2%;               /* Shift UP or DOWN */
            left: 71.3%;              /* Shift LEFT or RIGHT */
            width: 13.0%;             /* Make WIDER or NARROWER */
            height: 3.2%;             /* Make TALLER or SHORTER */
            border-radius: 20px;
            cursor: pointer;
            border: none;
            padding: 0;
            
            /* CHANGE COLOR TRANSPARENCY HERE 
               Currently set to '0' (Invisible). Change to '0.4' to see it turn purple for testing!
            */
            background-color: rgba(147, 112, 219, 0); 
            z-index: 5;
        }

        /* ==========================================================================
           DYNAMIC POPUP CARD FOR SELECTED FILE (Matches your design system)
           ========================================================================== */
        .dynamic-file-card {
            position: absolute;
            top: 55.4%;
            left: 71.3%;
            width: 13.0%;
            height: 11.5%;
            background-color: #5d432c; 
            border-radius: 40px;       
            display: none;             /* Activated via JavaScript on upload validation hook */
            align-items: center;
            padding: 0 16px;
            z-index: 6;
            cursor: pointer;
            color: #f3edd7;
        }

        .file-icon {
            width: 20px;
            height: 25px;
            background-color: #f3edd7;
            border-radius: 3px;
            position: relative;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .file-icon::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 7px;
            height: 7px;
            background-color: #5d432c;
            border-bottom-left-radius: 3px;
        }

        .file-info-block {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-align: left;
        }

        .file-name-text {
            font-size: clamp(8px, 0.75vw, 11px);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0;
        }

        .file-size-text {
            font-size: clamp(7px, 0.65vw, 9px);
            color: #c9b39c;
            margin: 2px 0 0 0;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="home.png" alt="Home Page" class="web-page">

        <input type="file" id="fileInput" accept=".pdf">

        <div class="header-nav-hotspot btn-nav-read" onclick="alert('Read Tab Clicked!')"></div>
        <div class="header-nav-hotspot btn-nav-assess" onclick="alert('Assessment Tab Clicked!')"></div>
        <div class="header-nav-hotspot btn-nav-profile" onclick="alert('Profile Tab Clicked!')"></div>

        <div class="custom-upload-hotspot" id="dropZone" onclick="triggerBrowse()"></div>

        <div class="dynamic-file-card" id="fileCard" onclick="triggerBrowse()">
            <div class="file-icon"></div>
            <div class="file-info-block">
                <p class="file-name-text" id="cardName">Document.pdf</p>
                <p class="file-size-text" id="cardSize">0.0 KB</p>
            </div>
        </div>

        <button class="custom-read-hotspot" onclick="processPdf()"></button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>
    // Set up the worker source path for the library immediately
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // Global variables
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const fileCard = document.getElementById('fileCard');
    const cardName = document.getElementById('cardName');
    const cardSize = document.getElementById('cardSize');
    let uploadedFile = null;

    // Trigger browse file explorer click
    function triggerBrowse() {
        fileInput.click();
    }

    // Handle traditional browse file selection
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleFileSelection(e.target.files[0]);
        }
    });

    // Enable simple Drag & Drop mechanics natively
    window.addEventListener('dragover', (e) => e.preventDefault());
    window.addEventListener('drop', (e) => e.preventDefault());

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length > 0) {
            handleFileSelection(e.dataTransfer.files[0]);
        }
    });

    // Helper function to format document memory sizing strings
    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    // Unified file validation and UI update logic
    function handleFileSelection(file) {
        if (file && (file.type === "application/pdf" || file.name.endsWith('.pdf'))) {
            uploadedFile = file;
            
            cardName.innerText = file.name;
            cardSize.innerText = formatBytes(file.size);
            
            // Hide default upload container visual drop spot, display data card info layout
            dropZone.style.display = 'none';
            fileCard.style.display = 'flex';
        } else {
            alert("Please upload PDF files only.");
        }
    }

    // THE REAL PARSER ENGINE LOOP
    function processPdf() {
        if (!uploadedFile) {
            alert("Please choose a file first by clicking the Drop PDF oval icon!");
            return;
        }

        alert(`Reading your live document: "${uploadedFile.name}"... Please click OK to parse text lines.`);

        const reader = new FileReader();
        
        // Read the file as an ArrayBuffer array for binary processing
        reader.onload = function(e) {
            const typedarray = new Uint8Array(e.target.result);

            // Load the PDF Document data structure
            pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                let maxPages = pdf.numPages;
                let countPromises = [];

                // Loop through pages to collect text layers
                for (let j = 1; j <= maxPages; j++) {
                    let pagePromise = pdf.getPage(j).then(function(page) {
                        return page.getTextContent().then(function(textContent) {
                            return textContent.items.map(item => item.str).join(" ");
                        });
                    });
                    countPromises.push(pagePromise);
                }

                // Gather all text strings from the promises array
                return Promise.all(countPromises);
            }).then(function(pageTexts) {
                // Combine all pages into one single body text string
                const fullText = pageTexts.join(" ");

                // Regex engine rule: clean and split text cleanly into separate sentences
                let sentencesArray = fullText.match(/[^.!?]+[.!?]+(\s|$)/g);
                
                // Clean up white spaces on each extracted sentence line item
                if (sentencesArray) {
                    sentencesArray = sentencesArray.map(s => s.trim()).filter(s => s.length > 5);
                } else {
                    sentencesArray = [fullText]; // Fallback if text doesn't contain clear punctuation
                }

                // SAVE the real sentence array to the browser's shared storage memory
                localStorage.setItem("processedPdfText", JSON.stringify(sentencesArray));

                // Redirect automatically straight into your presentation layout workspace!
                window.location.href = "read.html";

            }).catch(function(error) {
                console.error("PDF Parsing failed: ", error);
                alert("Oops! Could not extract text from this specific PDF. Please try a different academic text document.");
            });
        };

        reader.readAsArrayBuffer(uploadedFile);
    }
</script>

</body>
</html>
