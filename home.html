<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #2b3925;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Comfortaa', sans-serif;
        }
        .wrapper { position: relative; width: 100%; max-width: 1000px; margin: auto; }
        .web-page { width: 100%; height: auto; display: block; }

        /* Navigation Hotspots */
        .nav-hotspot { position: absolute; top: 4.5%; height: 4.5%; cursor: pointer; z-index: 10; }
        .btn-home { left: 42.5%; width: 7.5%; }
        .btn-read { left: 51.0%; width: 6.5%; }

        /* FIXED 1: Precision Drop Zone Coordinates
           Tightened heights securely over your background layout asset to prevent overlapping 
           the physical boundaries of the lower Golden Pill clickable target container.
        */
        .drop-zone {
            position: absolute;
            top: 57.0%; left: 71.9%;
            width: 13.5%; height: 8.5%;
            border-radius: 28px;
            cursor: pointer;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .drop-zone.dragover { background-color: rgba(255, 255, 255, 0.15); }
        
        /* FIXED 2: Solid Brown Pill Widget Content Card
           Changed layout properties to display with full absolute alpha opacity rendering layers.
        */
        .file-pill-container {
            display: none; 
            width: 100%;
            height: 100%;
            background-color: #5c2c16 !important; /* Forces solid dark brown fill overlay coverage */
            border-radius: 28px;
            position: absolute;
            top: 0; left: 0;
            align-items: center;
            justify-content: flex-start;
            padding: 0 16px;
            gap: 12px;
            z-index: 16;
        }

        /* Modern CSS Custom File Thumbnail Layout */
        .file-icon {
            width: 22px;
            height: 28px;
            background-color: #fff8eb;
            border-radius: 3px;
            position: relative;
            flex-shrink: 0;
        }
        .file-icon::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 7px; height: 7px;
            background-color: #ddcfba;
            border-bottom-left-radius: 3px;
        }

        /* File Information Typography Adjustments */
        .file-meta {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            text-align: left;
        }
        .file-name {
            color: #fcead2;
            font-size: 0.62rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Keeps long titles neatly clipped into "..." format */
            max-width: 80px;
        }
        .file-size {
            color: #c99b77;
            font-size: 0.52rem;
            font-weight: 500;
            margin-top: 1px;
        }

        /* FIXED 3: Dominant Click Layer For "Let's Read" Button
           Elevated z-index values to stack completely free of bounding boxes.
        */
        .btn-lets-read {
            position: absolute;
            top: 80.2%; left: 71.4%;
            width: 14.3%; height: 5.0%;
            cursor: pointer;
            z-index: 30; /* Higher priority execution layer guarantees click registers */
            background-color: rgba(0,0,0,0);
        }
    </style>
</head>
<body>

    <div class="wrapper">
