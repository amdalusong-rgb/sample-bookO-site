<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
        }
        
        /* The main interface shell container layout */
        .dashboard-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
        }

        .background-canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        #fileInput {
            display: none;
        }

        /* FIXED HEADER: Real clickable textual link layout zone overlay */
        .top-navbar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8%; /* Locks strictly over the header block */
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 20%;
            z-index: 100;
        }
        
        .nav-item {
            color: transparent; /* Invisible but perfectly takes up text space over graphic */
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        /* FIXED INTERACTIVE AREA: Locked container box on the right panel grid */
        .interactive-panel {
            position: absolute;
            top: 35%;
            right: 6.5%;
            width: 17%;
            height: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
        }

        /* The Oval Upload Trigger Asset Box Frame area */
        .upload-capsule {
            width: 100%;
            height: 40%;
            border-radius: 40px;
            cursor: pointer;
            background-color: rgba(255, 0, 0, 0.3); /* Transparent Red to see placement */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .upload-capsule:hover {
            transform: scale(1.03);
        }

        /* Dynamic Rendered Asset File UI component box block */
        .file-card-active {
            width: 100%;
            height: 100%;
            background-color: #5d432c;
            border-radius: 35px;
            display: none;
            align-items: center;
            padding: 0 15px;
            color: #f3edd7;
        }

        .file-mini-icon {
            width: 20px;
            height: 26px;
            background-color: #f3edd7;
            border-radius: 3px;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .file-meta-data {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .meta-title {
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0;
        }

        .meta-size {
            font-size: 9px;
            color: #c9b39c;
            margin: 2px 0 0 0;
        }

        /* The "Let's Read" submission trigger asset area box layout */
        .action-read-button {
            width: 85%;
            height: 15%;
            border-radius: 25px;
            background-color: rgba(147, 112, 219, 0.4); /* Transparent Purple to verify position */
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .action-read-button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <img src="home.png" alt="Dashboard" class="background-canvas">

        <div class="top-navbar">
            <a class="nav-item" onclick="alert('Read Tab Clicked!')">Read</a>
            <a class="nav-item" onclick="alert('Assessment Tab Clicked!')">Assessment</a>
            <a class="nav-item" onclick="alert('Profile Tab Clicked!')">Profile</a>
        </div>

        <div class="interactive-panel">
            
            <input type="file" id="fileInput" accept=".pdf">

            <div class="upload-capsule" id="dropZone" onclick="triggerBrowse()">
                <div class="file-card-active" id="fileCard">
                    <div class="file-mini-icon"></div>
                    <div class="file-meta-data">
                        <p class="meta-title" id="cardName">Document.pdf</p>
                        <p class="meta-size" id="cardSize">0.0 KB</p>
                    </div>
                </div>
            </div>

            <button class="action-read-button" onclick="processPdf()"></button>
            
        </div>
    </div>

        const cardName = document.getElementById('cardName');
