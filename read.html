<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Read Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
            overflow-x: hidden;
        }
        
        /* Anchor container bounding your background layout */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px; /* Constrains scale size perfectly */
            margin: auto;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Nav Header Navigation Map Links */
        .nav-hotspot {
            position: absolute;
            top: 4.5%;
            height: 4.5%;
            cursor: pointer;
            background-color: rgba(0, 0, 0, 0); 
            z-index: 10;
        }
        .btn-home { left: 44.5%; width: 7.5%; }
        .btn-read { left: 54.0%; width: 6.5%; }
        .btn-assess { left: 61.5%; width: 10.0%; }
        .btn-profile { left: 72.5%; width: 7.5%; }

        /* THE LIVE TEXT LINE STYLING MATRIX */
        .focus-line {
            position: absolute;
            left: 36.2%;   /* Perfectly matches the white card start boundary margin */
            width: 48%;    /* Spans exactly across the width of your template bars */
            font-size: clamp(0.65rem, 1.15vw, 1.05rem);
            font-weight: 700;
            text-align: left;
            z-index: 5;
            display: flex;
            align-items: center;
            padding: 0 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Keeps long sentences from breaking layouts */
        }
        
        /* Dark green focus row alignment overlay */
        #sentenceBox1 {
            top: 31.4%;
            height: 5.3%;
            color: #ffffff; /* White text contrast layer */
        }

        /* Light gray second row alignment overlay */
        #sentenceBox2 {
            top: 37.6%;
            height: 4.6%;
            color: #2b3925; /* Dark text contrast layer */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="read.png" alt="bookO Read Layout View" class="web-page">

        <div class="nav-hotspot btn-home" onclick="window.location.href='home.html'"></div>
        <div class="nav-hotspot btn-read" onclick="window.location.href='read.html'"></div>
        <div class="nav-hotspot btn-assess" onclick="alert('Assessment module launching soon!')"></div>
        <div class="nav-hotspot btn-profile" onclick="alert('User profile settings menu loading...')"></div>

        <div id="sentenceBox1" class="focus-line">Reading line text layer initialization track...</div>
        <div id="sentenceBox2" class="focus-line">Waiting for layout parser execution...</div>
    </div>

    <script>
        window.onload = function() {
            const storedData = localStorage.getItem("processedPdfText");
            const box1 = document.getElementById("sentenceBox1");
            const box2 = document.getElementById("sentenceBox2");

            if (storedData) {
                try {
                    const parsed = JSON.parse(storedData);
                    
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        box1.innerText = parsed[0];
                        box2.innerText = parsed[1] ? parsed[1] : "...End of Document File content...";
                    } else {
                        box1.innerText = storedData.substring(0, 75);
                        box2.innerText = "";
                    }
                } catch(e) {
                    box1.innerText = storedData.substring(0, 75);
                    box2.innerText = "";
                }
            } else {
                box1.innerText = "No document active. Please go back to Home to drop an academic file.";
                box2.innerText = "";
            }
        };
    </script>

</body>
</html>
