<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Reader View</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #1c2619;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Comfortaa', sans-serif;
        }
        
        @font-face {
            font-family: 'OpenDyslexic';
            src: url('https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/fonts/OpenDyslexic-Regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        /* Dynamically updates document fonts across target items when active */
        body.dyslexic-font, 
        body.dyslexic-font .focus-box-primary,
        body.dyslexic-font .focus-box-secondary,
        body.dyslexic-font .reading-line-item {
            font-family: 'OpenDyslexic', 'Comfortaa', sans-serif !important;
        }

        .wrapper { position: relative; width: 100%; max-width: 1000px; margin: auto; }
        .web-page { width: 100%; height: auto; display: block; }

        /* --- RE-ALIGNED HITBOX FOR SIDEBAR SLIDER SWITCH --- */
        .dyslexia-switch-overlay {
            position: absolute;
            top: 41.2%; 
            left: 11.2%;
            width: 3.5%; 
            height: 2.2%;
            opacity: 0; 
            cursor: pointer;
            z-index: 110;
        }

        /* Nav hot-links inside reader sidebar */
        .reader-nav-home {
            position: absolute;
            top: 4.5%; left: 42.5%;
            width: 7.5%; height: 4.5%;
            cursor: pointer; z-index: 100;
        }

        /* The white text display layout column wrapper box inside the graphic sheet asset boundaries */
        .sheet-container {
            position: absolute;
            top: 17.5%; left: 34.2%;
            width: 53.8%; height: 75.5%;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            padding: 24px 32px;
            overflow-y: auto;
        }

        /* Primary Highlight Target Text Block styling rule definitions */
        .focus-box-primary {
            background-color: #263822;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 12px 18px;
            border-radius: 8px;
            line-height: 1.5;
            margin-bottom: 12px;
            text-align: left;
            word-break: break-word;
        }

        /* Secondary Focus Row item text layout specs */
        .focus-box-secondary {
            background-color: #e2e9e0;
            color: #384e33;
            font-size: 0.88rem;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 8px;
            line-height: 1.5;
            margin-bottom: 24px;
            text-align: left;
            word-break: break-word;
        }

        /* Stream Container block formatting definitions */
        .remaining-content-block {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        /* Line-by-Line Unhighlighted Flow Runs formatting classes */
        .reading-line-item {
            color: #b0b8ae;
            font-size: 0.85rem;
            line-height: 1.6;
            text-align: left;
            word-break: break-word;
            padding: 4px 6px;
            border-bottom: 1px solid #eef2ed;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img id="readerBg" src="read.png" alt="bookO Reader Frame Layout" class="web-page">

        <div class="reader-nav-home" onclick="window.location.href='home.html'"></div>
        <input type="checkbox" id="toggleDyslexia" class="dyslexia-switch-overlay">

        <div class="sheet-container">
            <div id="sentenceBox1" class="focus-box-primary">Loading your academic document text track...</div>
            <div id="sentenceBox2" class="focus-box-secondary">Preparing layout engine parsing frames...</div>
            <div id="remainingTextBlock" class="remaining-content-block"></div>
        </div>
    </div>

<script>
    window.onload = function() {
        const box1 = document.getElementById("sentenceBox1");
        const box2 = document.getElementById("sentenceBox2");
        const remainderContainer = document.getElementById("remainingTextBlock");
        const backgroundPageImg = document.getElementById("readerBg");
        const dyslexicToggle = document.getElementById("toggleDyslexia");

        box1.innerText = "";
        box2.innerText = "";
        remainderContainer.innerHTML = "";

        let storedData = localStorage.getItem("processedPdfText");
        let sentences = [];

        try {
            if (storedData) {
                sentences = JSON.parse(storedData);
            }
        } catch (e) {
            console.error("Error loading payload text arrays:", e);
        }

        if (!sentences || sentences.length === 0) {
            sentences = [
                "No processing track data layer discovered.",
                "Please make sure to choose or drag an academic document file inside your main dashboard workspace first."
            ];
        }

        if (sentences.length > 0) box1.innerText = sentences[0];
        if (sentences.length > 1) {
            box2.innerText = sentences[1];
            box2.style.display = "block";
        } else {
            box2.style.display = "none";
        }

        if (sentences.length > 2) {
            for (let i = 2; i < sentences.length; i++) {
                const lineElement = document.createElement("div");
                lineElement.className = "reading-line-item";
                lineElement.innerText = sentences[i];
                remainderContainer.appendChild(lineElement);
            }
        }

        // --- MANAGE PERSISTENT PERSISTENCE VIA LOCALSTORAGE ---
        let isDyslexicModeActive = localStorage.getItem("dyslexicModeEnabled") === "true";

        if (isDyslexicModeActive) {
            document.body.classList.add('dyslexic-font');
            if (backgroundPageImg) backgroundPageImg.src = 'readOpenDyslexic.png';
            if (dyslexicToggle) dyslexicToggle.checked = true;
        } else {
            document.body.classList.remove('dyslexic-font');
            if (backgroundPageImg) backgroundPageImg.src = 'read.png';
            if (dyslexicToggle) dyslexicToggle.checked = false;
        }

        // --- CAPTURE USER HITBOX CLICK EVENTS ---
        if (dyslexicToggle) {
            dyslexicToggle.addEventListener('change', () => {
                if (dyslexicToggle.checked) {
                    document.body.classList.add('dyslexic-font');
                    if (backgroundPageImg) backgroundPageImg.src = 'readOpenDyslexic.png';
                    localStorage.setItem("dyslexicModeEnabled", "true");
                } else {
                    document.body.classList.remove('dyslexic-font');
                    if (backgroundPageImg) backgroundPageImg.src = 'read.png';
                    localStorage.setItem("dyslexicModeEnabled", "false");
                }
            });
        }
    };
</script>
</body>
</html>
