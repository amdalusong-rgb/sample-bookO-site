<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Read Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
            overflow-x: hidden;
        }
        
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: auto;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Nav Header Navigation Mapping */
        .nav-hotspot {
            position: absolute;
            top: 4.5%;
            height: 4.5%;
            cursor: pointer;
            background-color: rgba(0, 0, 0, 0); 
            z-index: 10;
        }
        .btn-home { left: 42.5%; width: 7.5%; }
        .btn-read { left: 51.0%; width: 6.5%; }
        .btn-assess { left: 59.5%; width: 10.0%; }
        .btn-profile { left: 70.5%; width: 7.5%; }

        /* THE SINGLE MAIN READING ENGINE FLOW CONTAINER */
        .reading-flow-container {
            position: absolute;
            left: 36.2%; /* Shifted right slightly for beautiful symmetry */
            width: 46.5%; /* Narrowed to guarantee text never clips the card boundary edge */
            top: 27.2%;
            font-size: clamp(0.6rem, 1.1vw, 0.95rem);
            font-weight: 700;
            line-height: 2.3; 
            text-align: left;
            z-index: 5;
        }

        /* Target styles applied dynamically to specific text line tracks */
        .line-track {
            display: block; /* Ensures each block forms its own full-width focus corridor */
            width: 100%;
            padding: 6px 14px;
            border-radius: 6px;
            white-space: normal; /* Permits text elements to gracefully settle down */
            word-break: break-word; /* Hard safety line wrap container guard */
            box-sizing: border-box;
        }

        .focus-primary {
            background-color: #2b3925 !important;
            color: #ffffff !important;
        }

        .focus-secondary {
            background-color: #e3e8e1 !important;
            color: #2b3925 !important;
            margin-top: 10px; /* Aligns row spacing with your background tracking grid */
        }

        /* Non-highlighted text lines corridor block */
        .remaining-line {
            display: block;
            width: 100%;
            padding: 6px 14px;
            white-space: normal;
            word-break: break-word;
            color: rgba(43, 57, 37, 0.35); /* Elegant low-opacity trailing lines */
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="readOpenDyslexic.png?v=3" alt="bookO Read Layout View" class="web-page">

        <div class="nav-hotspot btn-home" onclick="window.location.href='home.html'"></div>
        <div class="nav-hotspot btn-read" onclick="window.location.href='read.html'"></div>
        <div class="nav-hotspot btn-assess" onclick="alert('Assessment module launching soon!')"></div>
        <div class="nav-hotspot btn-profile" onclick="alert('User profile settings menu loading...')"></div>

        <div id="readingFlow" class="reading-flow-container">Loading your document layout tracks...</div>
    </div>

    <script>
        window.onload = function() {
            const storedData = localStorage.getItem("processedPdfText");
            const flowContainer = document.getElementById("readingFlow");

            if (!storedData) {
                flowContainer.innerText = "No active document track found. Please return to Home.";
                return;
            }

            try {
                const parsed = JSON.parse(storedData);
                let fullText = Array.isArray(parsed) ? parsed.join(" ") : storedData;
                
                // Clear the default loading state message string
                flowContainer.innerHTML = "";

                // Temporary block element to let the browser naturally calculate line wrap breaks
                const tempDiv = document.createElement("div");
                tempDiv.style.width = flowContainer.offsetWidth + "px";
                tempDiv.style.font = window.getComputedStyle(flowContainer).font;
                tempDiv.style.visibility = "hidden";
                tempDiv.style.position = "absolute";
                tempDiv.style.whiteSpace = "normal";
                tempDiv.style.wordBreak = "break-word";
                document.body.appendChild(tempDiv);

                // Break text string down into single words to find exact wrap points
                const words = fullText.split(" ");
                let currentLineText = "";
                const linesArray = [];

                for (let i = 0; i < words.length; i++) {
                    let testLine = currentLineText + (currentLineText ? " " : "") + words[i];
                    tempDiv.innerText = testLine;
                    
                    // If the word pushes the layout past the visual container margin limits, break it!
                    if (tempDiv.offsetHeight > 30 && currentLineText !== "") {
                        linesArray.push(currentLineText);
                        currentLineText = words[i];
                    } else {
                        currentLineText = testLine;
