<script>
    window.onload = function() {
        const box1 = document.getElementById("sentenceBox1");
        const box2 = document.getElementById("sentenceBox2");
        const remainderContainer = document.getElementById("remainingTextBlock");

        // CRITICAL RESET: Clear out formatting boundaries
        box1.innerText = "";
        box2.innerText = "";
        remainderContainer.innerHTML = "";

        // 1. DATA ACQUISITION & FALLBACK CHECK
        let storedData = localStorage.getItem("processedPdfText");
        let sentences = [];

        try {
            if (storedData) {
                sentences = JSON.parse(storedData);
            }
        } catch (e) {
            console.error("Error reading stored text array sequence:", e);
        }

        // Apply fallback instructions if array content is empty
        if (!sentences || sentences.length === 0) {
            sentences = [
                "Welcome to bookO Reader!",
                "No processing data track was detected from your dashboard session layout.",
                "Please return to the Home page and load your academic document to begin reading line by line."
            ];
        }

        // 2. FIXED: LINE-BY-LINE HIGHLIGHT EXTRACTION
        // Displays complete, uninterrupted sentences matching the core user design track
        if (sentences.length > 0) {
            box1.innerText = sentences[0];
        }

        if (sentences.length > 1) {
            box2.innerText = sentences[1];
            box2.style.display = "flex";
        } else {
            box2.style.display = "none";
        }

        // 3. FIXED: MARGIN-ALIGNED UNHIGHLIGHTED FLOW RUNS
        // Renders remaining sentences sequentially down the card with native CSS word wrap safety
        if (sentences.length > 2) {
            for (let i = 2; i < Math.min(sentences.length, 12); i++) {
                const lineDiv = document.createElement("div");
                
                // Uses the styling rules from your remaining-line layout sheet class
                lineDiv.className = "remaining-line"; 
                lineDiv.innerText = sentences[i];
                
                // Injects CSS styles directly to enforce consistent layout margins
                lineDiv.style.width = "100%";
                lineDiv.style.textAlign = "left";
                lineDiv.style.marginBottom = "12px";
                lineDiv.style.lineHeight = "1.5";
                lineDiv.style.wordBreak = "break-word";
                lineDiv.style.whiteSpace = "normal";
                
                remainderContainer.appendChild(lineDiv);
            }
        }
    };
</script>
