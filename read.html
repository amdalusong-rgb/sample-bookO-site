<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Read Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Nav Header Navigation Links */
        .nav-hotspot {
            position: absolute;
            top: 4.5%;
            height: 4.5%;
            cursor: pointer;
            background-color: rgba(0, 0, 0, 0); 
            z-index: 10;
        }
        .btn-home { left: 44.5%; width: 7.5%; }
        .btn-read { left: 54.0%; width: 6.5%; }
        .btn-assess { left: 61.5%; width: 10.0%; }
        .btn-profile { left: 72.5%; width: 7.5%; }

        /* THE LIVE TEXT CONTAINER BOX LAYER */
        .text-display-box {
            position: absolute;
            top: 52%;  /* Adjust these percentages to place the text right over your image box design layout */
            left: 55%;
            width: 40%;
            transform: translate(-10%, -50%);
            color: #5d432c; /* Uses your theme's elegant brown text */
            font-weight: 700;
            font-size: clamp(1rem, 1.5vw, 1.4rem);
            line-height: 1.6;
            z-index: 5;
            text-align: left;
            padding-right: 20px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="read.png" alt="bookO Read Layout View" class="web-page">

        <div class="nav-hotspot btn-home" onclick="window.location.href='home.html'"></div>
        <div class="nav-hotspot btn-read" onclick="window.location.href='read.html'"></div>
        <div class="nav-hotspot btn-assess" onclick="alert('Assessment module launching soon!')"></div>
        <div class="nav-hotspot btn-profile" onclick="alert('User profile settings menu loading...')"></div>

        <div id="liveTextOutput" class="text-display-box">
            Loading your document content...
        </div>
    </div>

    <div id="sentenceBox1" class="text-display-box" style="top: 8%;">Sentence line 1 will display here...</div>
    <div id="sentenceBox2" class="text-display-box" style="top: 20%; opacity: 0.5;">Sentence line 2 will display here...</div>

    <script>
        window.onload = function() {
            // Grab the raw JSON data block string out of storage memory
            const storedData = localStorage.getItem("processedPdfText");
            
            const box1 = document.getElementById("sentenceBox1");
            const box2 = document.getElementById("sentenceBox2");

            if (storedData) {
                // Parse the JSON array back into live script memory
                const sentencesArray = JSON.parse(storedData);

                if (sentencesArray && sentencesArray.length > 0) {
                    // Inject your real document text data cleanly into your UI layout text cards!
                    box1.innerText = sentencesArray[0]; 
                    box2.innerText = sentencesArray[1] ? sentencesArray[1] : "...End of Document...";
                } else {
                    box1.innerText = "Empty text layers found inside this document file.";
                    box2.innerText = "";
                }
            } else {
                box1.innerText = "No document active. Please go back to the home screen and drop a PDF file first!";
                box2.innerText = "";
            }
        };
    </script>

</body>
</html>
