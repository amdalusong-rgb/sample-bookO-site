<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Read Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Nav Header Navigation Links */
        .nav-hotspot {
            position: absolute;
            top: 4.5%;
            height: 4.5%;
            cursor: pointer;
            background-color: rgba(0, 0, 0, 0); 
            z-index: 10;
        }
        .btn-home { left: 44.5%; width: 7.5%; }
        .btn-read { left: 54.0%; width: 6.5%; }
        .btn-assess { left: 61.5%; width: 10.0%; }
        .btn-profile { left: 72.5%; width: 7.5%; }

        /* LINE POSITIONING ENGINE FOR ACTIVE FOCUS BLOCKS */
        .focus-line {
            position: absolute;
            left: 36%;
            width: 48%;
            font-size: clamp(0.75rem, 1.1vw, 1.1rem);
            line-height: 1.3;
            font-weight: 500;
            text-align: left;
            z-index: 5;
            pointer-events: none; /* Let clicks pass through if needed */
            display: flex;
            align-items: center;
        }
        
        /* Line 1 (Dark Focus Bar Overlay) */
        #sentenceBox1 {
            top: 31%;
            height: 5.5%;
            color: #ffffff; /* White text for contrast on the dark bar */
            padding: 0 10px;
        }

        /* Line 2 (Second Gray Bar Overlay) */
        #sentenceBox2 {
            top: 37.5%;
            height: 4.5%;
            color: #1c1c1c; /* Dark text for contrast on the light gray bar */
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="read.png" alt="bookO Read Layout View" class="web-page">

        <div class="nav-hotspot btn-home" onclick="window.location.href='home.html'"></div>
        <div class="nav-hotspot btn-read" onclick="window.location.href='read.html'"></div>
        <div class="nav-hotspot btn-assess" onclick="alert('Assessment module launching soon!')"></div>
        <div class="nav-hotspot btn-profile" onclick="alert('User profile settings menu loading...')"></div>

        <div id="sentenceBox1" class="focus-line">Loading line 1...</div>
        <div id="sentenceBox2" class="focus-line">Loading line 2...</div>
    </div>

    <script>
        window.onload = function() {
            const storedData = localStorage.getItem("processedPdfText");
            const box1 = document.getElementById("sentenceBox1");
            const box2 = document.getElementById("sentenceBox2");

            if (storedData) {
                try {
                    // Check if data is stored as a structured array or a plain string
                    const parsed = JSON.parse(storedData);
                    
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        box1.innerText = parsed[0];
                        box2.innerText = parsed[1] ? parsed[1] : "...End of Document...";
                    } else {
                        // If it parsed but isn't a valid array layout
                        box1.innerText = storedData.substring(0, 80) + "...";
                        box2.innerText = "";
                    }
                } catch(e) {
                    // Fallback handle if it's stored as plain un-stringified text
                    box1.innerText = storedData.substring(0, 80) + "...";
                    box2.innerText = "";
                }
            } else {
                box1.innerText = "No document active. Please return to Home to drop a file.";
                box2.innerText = "";
            }
        };
    </script>

</body>
</html>
