<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Read Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
            overflow-x: hidden;
        }
        
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: auto;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Nav Header Navigation Mapping */
        .nav-hotspot {
            position: absolute;
            top: 4.5%;
            height: 4.5%;
            cursor: pointer;
            background-color: rgba(0, 0, 0, 0); 
            z-index: 10;
        }
        .btn-home { left: 42.5%; width: 7.5%; }
        .btn-read { left: 51.0%; width: 6.5%; }
        .btn-assess { left: 59.5%; width: 10.0%; }
        .btn-profile { left: 70.5%; width: 7.5%; }

        /* SHARED MARGIN ALIGNMENTS FOR EXTRACTED STRINGS */
        .text-container {
            position: absolute;
            left: 35.8%;
            width: 48.5%;
            font-size: clamp(0.6rem, 1.1vw, 0.95rem);
            font-weight: 700;
            text-align: left;
            z-index: 5;
            padding: 0 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
        }

        /* Dark focus line highlight slot */
        #sentenceBox1 {
            top: 27.5%;
            height: 5.3%;
            background-color: #2b3925; 
            color: #ffffff; 
            border-radius: 6px;
        }

        /* Light secondary focus highlight slot */
        #sentenceBox2 {
            top: 33.7%;
            height: 4.6%;
            background-color: #e3e8e1; 
            color: #2b3925; 
            border-radius: 6px;
        }

        /* Non-highlighted text lines corridor block */
        .remaining-text-block {
            position: absolute;
            left: 35.8%;
            width: 48.5%;
            top: 39.5%; /* Positioned directly underneath the second tracking box */
            font-size: clamp(0.6rem, 1.1vw, 0.95rem);
            font-weight: 700;
            line-height: 1.85; 
            text-align: left;
            color: rgba(43, 57, 37, 0.35); /* Soft, unhighlighted reading layout font */
            z-index: 4;
            padding: 0 14px;
        }
        .remaining-line {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="readOpenDyslexic.png?v=2" alt="bookO Read Layout View" class="web-page">

        <div class="nav-hotspot btn-home" onclick="window.location.href='home.html'"></div>
        <div class="nav-hotspot btn-read" onclick="window.location.href='read.html'"></div>
        <div class="nav-hotspot btn-assess" onclick="alert('Assessment module launching soon!')"></div>
        <div class="nav-hotspot btn-profile" onclick="alert('User profile settings menu loading...')"></div>

        <div id="sentenceBox1" class="text-container"></div>
        <div id="sentenceBox2" class="text-container"></div>

        <div id="remainingTextBlock" class="remaining-text-block"></div>
    </div>

    <script>
        window.onload = function() {
            const storedData = localStorage.getItem("processedPdfText");
            const box1 = document.getElementById("sentenceBox1");
            const box2 = document.getElementById("sentenceBox2");
            const remainderContainer = document.getElementById("remainingTextBlock");

            if (!storedData) {
                box1.innerText = "No active document track found. Please return to Home.";
                return;
            }

            try {
                const parsed = JSON.parse(storedData);
                let fullTextCombined = Array.isArray(parsed) ? parsed.join(" ") : storedData;

                // Set up the boundary width to constrain text rows
                const maxPixelWidth = box1.offsetWidth || 450; 
                const computedFont = window.getComputedStyle(box1).font || "700 14px Comfortaa";

                // Divide the text block into cleanly structured rows
                const layoutLines = formatTextIntoLines(fullTextCombined, maxPixelWidth, computedFont);

                // Assign Line 1 to the dark box
                if (layoutLines.length > 0) {
                    box1.innerText = layoutLines[0];
                }

                // Assign Line 2 to the light box
                if (layoutLines.length > 1) {
                    box2.innerText = layoutLines[1];
                } else {
                    box2.style.display = "none"; // Hide the box if there's no text for it
                }

                // Append any remaining lines below without highlights
                if (layoutLines.length > 2) {
                    for (let i = 2; i < Math.min(layoutLines.length, 10); i++) {
                        const lineDiv = document.createElement("div");
                        lineDiv.className = "remaining-line";
                        lineDiv.innerText = layoutLines[i];
                        remainderContainer.appendChild(lineDiv);
                    }
                }

            } catch (e) {
                console.error(e);
                box1.innerText = "Error parsing text document alignment streams.";
            }
        };

        // Helper function that splits text into individual lines based on container width
        function formatTextIntoLines(text, maxWidth, font) {
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            context.font = font;

            const words = text.split(" ");
            const lines = [];
            let currentLine = "";

            for (let i = 0; i < words.length; i++) {
                let testLine = currentLine + (currentLine ? " " : "") + words[i];
                let metrics = context.measureText(testLine);
                
                if (metrics.width > maxWidth && i > 0) {
                    lines.push(currentLine);
                    currentLine = words[i];
                } else {
                    currentLine = testLine;
                }
            }
            if (currentLine) {
                lines.push(currentLine);
            }
            return lines;
        }
    </script>

</body>
</html>
