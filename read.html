<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookO - Read Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2b3925;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', sans-serif;
            overflow-x: hidden;
        }
        
        /* Main responsive wrapper matching your design layout dimensions */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: auto;
        }
        .web-page {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Nav Header Navigation Mapping */
        .nav-hotspot {
            position: absolute;
            top: 4.5%;
            height: 4.5%;
            cursor: pointer;
            background-color: rgba(0, 0, 0, 0); 
            z-index: 10;
        }
        .btn-home { left: 42.5%; width: 7.5%; }
        .btn-read { left: 51.0%; width: 6.5%; }
        .btn-assess { left: 59.5%; width: 10.0%; }
        .btn-profile { left: 70.5%; width: 7.5%; }

        /* SENTENCE CORRIDOR FOCUS OVERLAYS */
        .focus-line {
            position: absolute;
            left: 35.8%; /* Snaps text to the left margin of the blank card container */
            width: 48.5%; /* Restricts line lengths to keep text within the page margins */
            font-size: clamp(0.6rem, 1.1vw, 0.95rem);
            font-weight: 700;
            text-align: left;
            z-index: 5;
            display: flex;
            align-items: center;
            padding: 0 14px;
            border-radius: 6px;
        }
        
        /* Dark tracking bar line */
        #sentenceBox1 {
            top: 27.5%; /* Shifted up slightly to perfectly align with the new blank asset spacing */
            height: 5.3%;
            background-color: #2b3925; 
            color: #ffffff; 
        }

        /* Soft gray secondary trailing line */
        #sentenceBox2 {
            top: 33.7%;
            height: 4.6%;
            background-color: #e3e8e1; 
            color: #2b3925; 
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="readOpenDyslexic.png?v=2" alt="bookO Read Layout View" class="web-page">

        <div class="nav-hotspot btn-home" onclick="window.location.href='home.html'"></div>
        <div class="nav-hotspot btn-read" onclick="window.location.href='read.html'"></div>
        <div class="nav-hotspot btn-assess" onclick="alert('Assessment module launching soon!')"></div>
        <div class="nav-hotspot btn-profile" onclick="alert('User profile settings menu loading...')"></div>

        <div id="sentenceBox1" class="focus-line">Reading line text layer track...</div>
        <div id="sentenceBox2" class="focus-line">Waiting for layout engine parser execution...</div>
    </div>

    <script>
        window.onload = function() {
            const storedData = localStorage.getItem("processedPdfText");
            const box1 = document.getElementById("sentenceBox1");
            const box2 = document.getElementById("sentenceBox2");

            if (storedData) {
                try {
                    const parsed = JSON.parse(storedData);
                    
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        // Display the real first sentence on line 1, and sentence two on line 2!
                        box1.innerText = parsed[0];
                        box2.innerText = parsed[1] ? parsed[1] : "...End of text stream content...";
                    } else {
                        box1.innerText = "Could not cleanly map sentences. Try another text document.";
                        box2.innerText = "";
                    }
                } catch(e) {
                    box1.innerText = "Error reading application memory layers.";
                    box2.innerText = "";
                }
            } else {
                box1.innerText = "No document active. Please go back to Home to drop an academic file.";
                box2.innerText = "";
            }
        };
    </script>
